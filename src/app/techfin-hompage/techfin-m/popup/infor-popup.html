<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>크레디뷰 Design System - Modal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/Techfin-web/css/designsystem.css" />
    <style></style>
  </head>
  <body>
    <div class="comp-inner-root">
      <div class="comp-top">
        <h2 class="comp-pagetitle">Infor-popup popup</h2>
        <p class="comp-pagetitle-desc">infor 팝업 컴포넌트</p>
        <button type="button" class="comp-btn-code" onclick="openCode()">
          Code View
        </button>
      </div>

      <div id="compContents">
        <section class="comp-section">
          <h3 class="comp-objtitle">Default Modal</h3>

          <!-- Modal start -->
          <!-- 팝업 미리보기 가로별 class : w400, w520, w800>,
            <div class="review-popup-component w400">,
              <div class="review-popup-component w520">,
                <div class="review-popup-component w800">
                -->
          <div class="comp-fbox">
            <div class="review-popup-root">
              <div class="review-popup-component w400">
                <div class="review-popup-contents h-hidden">
                  <!-- <img
                    src=""
                    alt=""
                  /> -->
                </div>

                <div class="skip-today-box">
                  <div class="chk-box">
                    <input type="checkbox" id="chk" />
                    <label for="chk">오늘 하루 보지 않기</label>
                  </div>
                  <span class="skip-btn-close c-close">닫기</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Modal end -->
        </section>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // 모든 .c-close 버튼에 클릭 이벤트 추가
        const closeButtons = document.querySelectorAll('.c-close');

        closeButtons.forEach((button) => {
          button.addEventListener('click', function () {
            // .review-popup-component를 숨김
            const popup = document.querySelector('.review-popup-component');
            if (popup) {
              popup.style.display = 'none';
            }
          });
        });

        const popups = document.querySelectorAll('.review-popup-component');

        //     popup.style.transform = "none";
        //   } else {

        //     popup.style.top = "50%";
        //     popup.style.left = "50%";
        //     popup.style.transform = "translate(-50%, -50%)";
        //   }
        // });
      });
    </script>
    <!-- code view -->
    <script src="/src/app/designsystem/js/highlight.min.js"></script>
    <script src="/src/app/designsystem/js/go.min.js"></script>
    <script src="/src/app/designsystem/js/codeview.js"></script>
    <script>
      hljs.highlightAll();
    </script>

    <!-- component js -->
    <script src="/src/app/designsystem/js/popper.min.js"></script>
    <script src="/src/app/designsystem/js/tippy-bundle.umd.js"></script>
    <script src="/src/app/designsystem/js/custom.js"></script>
  </body>
</html>
