<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>테크핀-웹 문의하기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/techfin-hompage/techfin-w/css/techfin.css" />
  </head>

  <body>
    <div class="SOLAlert-root">
      <div class="SOLAlert-backdrop"></div>
      <div class="SOLAlert-box">
        <div class="SOLAlert-icon">
          <!-- sussess icon -->
          <i class="SOLIcon-root SOLIcon-alert success">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="12" cy="12.0015" r="12" fill="#2CC78E"></circle>
              <path
                d="M16.3646 7.7427C16.8527 7.25455 17.644 7.25455 18.1321 7.7427C18.6202 8.23086 18.6203 9.02215 18.1321 9.51028L11.3821 16.2603C10.9245 16.7177 10.2002 16.7466 9.70928 16.3462L9.61456 16.2603L5.86456 12.5103C5.37646 12.0222 5.37659 11.2309 5.86456 10.7427C6.35271 10.2545 7.14398 10.2545 7.63214 10.7427L10.4983 13.6089L16.3646 7.7427Z"
                fill="white"
              ></path>
            </svg>
          </i>
        </div>
        <div class="SOLAlert-content">
          <p class="SOLText-desc">
            <em>문의사항이 접수되었습니다.</em>
          </p>
          <p class="SOLText-desc-sub">
            빠른 시일 내에 작성하신 연락처로<br />
            담당자가 답변드리겠습니다.
          </p>
        </div>

        <div class="SOLAlert-action">
          <button type="button" class="SOLBtn-root s--xs t--contained">
            확인
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
