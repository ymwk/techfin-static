<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>크레디뷰 Design System - Input</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/techfin-hompage/techfin-w/css/designsystem.css" />
    <style>
      .comp-fbox {
        align-items: stretch;
      }
    </style>
  </head>
  <body>
    <div class="comp-inner-root">
      <div class="comp-top">
        <h2 class="comp-pagetitle">Text Fields</h2>
        <p class="comp-pagetitle-desc">input text field 컴포넌트</p>
        <button type="button" class="comp-btn-code" onclick="openCode()">
          Code View
        </button>
      </div>

      <div id="compContents">
        <section class="comp-section">
          <h3 class="comp-objtitle">Default : width 100%</h3>
          <div class="comp-fbox">
            <label class="SOLInput-root">
              <span class="SOLInput-label">Normal</span>
              <div class="SOLInput-box">
                <input
                  type="text"
                  placeholder="내용을 입력해주세요."
                  class="SOLInput-field"
                />
              </div>
            </label>

            <label class="SOLInput-root">
              <span class="SOLInput-label">Hover</span>
              <div class="SOLInput-box">
                <input
                  type="text"
                  placeholder="내용을 입력해주세요."
                  class="SOLInput-field"
                />
              </div>
            </label>

            <label class="SOLInput-root">
              <span class="SOLInput-label">Active</span>
              <div class="SOLInput-box">
                <input
                  type="text"
                  placeholder="내용을 입력해주세요."
                  class="SOLInput-field"
                />
              </div>
            </label>

            <label class="SOLInput-root">
              <span class="SOLInput-label">Disabled</span>
              <div class="SOLInput-box">
                <input
                  type="text"
                  placeholder="내용을 입력해주세요."
                  class="SOLInput-field"
                  disabled="true"
                />
              </div>
            </label>

            <label class="SOLInput-root c--error">
              <span class="SOLInput-label">Validate</span>
              <div class="SOLInput-box">
                <input
                  type="text"
                  placeholder="내용을 입력해주세요."
                  class="SOLInput-field"
                />
              </div>
              <p class="SOLInput-msg">담당자명을 정확히 입력해 주세요.</p>
            </label>
          </div>

          <div class="comp-fbox">
            <div class="SOLTextarea-root">
              <span class="SOLTextarea-label impor"><em>문의내용</em></span>
              <textarea
                placeholder="문의 내용을 입력해 주세요."
                class="SOLTextarea_field error"
                style="height: 240px"
              ></textarea>
              <div class="SOLInput-byte s--between mgt5">
                <p class="SOLInput-msg c--error">내용을 입력해주세요.</p>
                <span class="SOLInput-byte--count">
                  <i>0</i>
                  <i>/</i>
                  <i>2000</i>
                  <i>byte</i>
                </span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- code view -->
    <script src="/src/app/designsystem/js/highlight.min.js"></script>
    <script src="/src/app/designsystem/js/go.min.js"></script>
    <script src="/src/app/designsystem/js/codeview.js"></script>
    <script>
      hljs.highlightAll();
    </script>

    <!-- component js -->
    <script src="/src/app/designsystem/js/popper.min.js"></script>
    <script src="/src/app/designsystem/js/tippy-bundle.umd.js"></script>
    <script src="/src/app/designsystem/js/custom.js"></script>
  </body>
</html>
