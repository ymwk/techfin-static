<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>크레디뷰 Design System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/techfin-hompage/techfin-w/css/designsystem.css" />
    <style>
      .comp-fbox {
        gap: 20px;
      }
    </style>
  </head>

  <body>
    <div class="comp-inner-root">
      <div class="comp-top">
        <h2 class="comp-pagetitle">Card</h2>
        <p class="comp-pagetitle-desc">Card 컴포넌트</p>
        <button type="button" class="comp-btn-code" onclick="openCode()">
          Code View
        </button>
      </div>

      <div id="compContents">
        <section class="comp-section">
          <h3 class="comp-objtitle">Card</h3>
          <div class="comp-fbox">
            <div class="SOLCardImg-root">
              <i>
                <img
                  src="/static/techfin-hompage/techfin-w/image/img/card-img01.png"
                  alt=""
                />
              </i>
              <i>
                <img
                  src="/static/techfin-hompage/techfin-w/image/img/card-img02.png"
                  alt=""
                />
              </i>
              <i>
                <img
                  src="/static/techfin-hompage/techfin-w/image/img/card-img03.png"
                  alt=""
                />
              </i>
              <i>
                <img
                  src="/static/techfin-hompage/techfin-w/image/img/card-img04.png"
                  alt=""
                />
              </i>
              <i>
                <img
                  src="/static/techfin-hompage/techfin-w/image/img/card-img05.png"
                  alt=""
                />
              </i>
              <i>
                <img
                  src="/static/techfin-hompage/techfin-w/image/img/card-img06.png"
                  alt=""
                />
              </i>
              <i>
                <img
                  src="/static/techfin-hompage/techfin-w/image/img/card-img07.png"
                  alt=""
                />
              </i>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- code view -->
    <script src="/src/app/designsystem/js/highlight.min.js"></script>
    <script src="/src/app/designsystem/js/go.min.js"></script>
    <script src="/src/app/designsystem/js/codeview.js"></script>
    <script>
      hljs.highlightAll();
    </script>

    <!-- component js -->
    <script src="/src/app/designsystem/js/popper.min.js"></script>
    <script src="/src/app/designsystem/js/tippy-bundle.umd.js"></script>
    <script src="/src/app/designsystem/js/custom.js"></script>

</html>
