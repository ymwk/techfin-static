  <body>
    <!-- Modal start -->
    <div class="SOLModal-root s--420">
      <div class="SOLModal-backdrop"></div>
      <div class="SOLModal-box alram-register-modal">
        <div class="alram-register-top">
          <div class="tit-box">
            <span class="tit">등급확인이 가능할 때 안내 드릴까요?</span>
            <span class="desc"
              >신용평가등급 확인이 가능한 시점에<br />이메일을 통해서
              안내해드립니다.</span
            >
          </div>
        </div>

        <div class="SOLModal-content">
          <p class="list-title-bullit">
            <span class="tit">신청정보</span>
            <span class="desc"
              >마스터 관리자 계정으로도 알림이 발송됩니다.</span
            >
          </p>
          <div class="msg-box">
            <span class="name">김효은</span>
            <span class="email">(khe6512@techfinratings.com)</span>
          </div>

          <ul class="SOLModal-terms-list">
            <li class="box-panel">
              <div class="SOLCheck-root t--terms">
                <label class="SOLCheck-label">
                  <input type="checkbox" name="" />
                  <span
                    >신용등급 산출가능 알림서비스 수신 동의서<br />(개인정보
                    포함)</span
                  >
                </label>
              </div>
              <button type="button" class="SOLIconBtn-root">
                <i class="SOLIcon-root SOLIcon-gt--r"></i>
              </button>
            </li>
          </ul>
        </div>
        <div class="SOLModal-action">
          <button type="button" class="SOLBtn-root s--lg t--contained">
            동의하고 신청하기
          </button>
        </div>

        <div class="close-box">
          <button class="no-show-btn">
            <span>다시 보지 않기</span>
          </button>
          <button class="dismiss-btn">
            <span>닫기</span>
          </button>
        </div>
      </div>
    </div>
    <!-- Modal end -->
  </body>
</html>
