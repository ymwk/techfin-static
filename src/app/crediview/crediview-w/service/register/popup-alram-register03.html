    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <meta property="og:title" content="크레디뷰" />

    <meta property="og:description" content="" />
    <meta property="og:url" content="웹사이트주소" />
    <meta property="al:web:url" content="웹사이트주소" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="웹사이트주소" />

    <link rel="stylesheet" href="/static/crediview/crediview-w/css/crediview.css" />
  </head>

  <body>
    <!-- Modal start -->
    <div class="SOLModal-root s--ss">
      <div class="SOLModal-backdrop"></div>
      <div class="SOLModal-box alram-register-modal">
        <div class="alram-register-top">
          <div class="tit-box">
            <span class="tit">SMS 알림신청</span>
            <span class="desc"
              >신용평가등급 확인이 가능한 시점에<br />이메일과 SMS(문자)를
              통해서도 안내해드립니다.</span
            >
          </div>
        </div>

        <div class="SOLModal-content">
          <p class="list-title-bullit">
            <span class="tit">휴대폰번호</span>
          </p>
          <div class="wrapper-inputlist">
            <label class="SOLInput-root s--lg c--error error-type02">
              <div class="SOLInput-box">
                <input
                  type="text"
                  placeholder="‘-(하이픈)'을 제외하고 입력해주세요."
                  value="1212"
                  class="SOLInput-field"
                />
                <span class="SOLInput-wrap">
                  <span class="SOLInput-wrap--hidden">
                    <button type="button" class="SOLInput-btn SOLIcon-close">
                      <span class="blind">Del</span>
                    </button>
                    <span class="SOLInput-icon"></span>
                  </span>
                  <button type="button" class="SOLBtn-root" disabled="false">
                    인증번호 전송
                  </button>
                </span>
              </div>
              <div class="SOLInput-byte s--between">
                <p class="SOLInput-msg c--error">
                  휴대폰 번호는 01로 시작하고 10~11자리어야 합니다.
                </p>
                <!-- byte -->
                <!-- <span class="SOLInput-byte--count">
                    <i>0</i>
                    <i>/</i>
                    <i>2000</i>
                    <i>byte</i>
                </span> -->
              </div>
            </label>
          </div>
        </div>
        <div class="SOLModal-action">
          <button
            type="button"
            class="SOLBtn-root s--lg t--contained"
            disabled="false"
          >
            신청하기
          </button>
        </div>
      </div>
    </div>
    <!-- Modal end -->
  </body>
</html>
