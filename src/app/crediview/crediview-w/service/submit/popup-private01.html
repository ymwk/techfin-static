  <body>
    <!-- Modal start -->
    <div class="SOLModal-root s--sm">
      <div class="SOLModal-backdrop"></div>
      <div class="SOLModal-box type02">
        <div class="SOLModal-title">
          <h3 class="SOLTitle-t2">제출 가능 기업</h3>
          <div class="SOLModal-close">
            <button type="button" class="SOLIconBtn-root">
              <i class="SOLIcon-root SOLIcon-close"></i>
              <span class="blind">Close</span>
            </button>
          </div>
        </div>
        <div class="SOLModal-content">
          <div class="notice-box-list sm">
            <ul class="list">
              <li>
                <span
                  ><em>OmniEsol 선택</em>하여 제출할 경우 전달 가능한 기업의
                  목록입니다.</span
                >
              </li>
              <li>
                <span
                  >제출된 ‘신용평가등급확인서’를 해당 기업들이 조회할 수 있도록
                  개별적으로 전송됩니다.<br />
                  단, 아래 기업 모두에게 자동으로 제출되는 것은 아니며, 용도에
                  따라<br />
                  필요한 기업에 한해 제공됩니다.</span
                >
              </li>
              <li>
                <span
                  >기업 목록은 사용 현황에 따라 수시로 변경될 수 있으니 이용에
                  참고해주세요.</span
                >
              </li>
            </ul>
          </div>

          <ul class="company-list-root mgt">
            <li>
              <span>미디어로그</span>
            </li>
            <li>
              <span>포스코 모빌리티</span>
            </li>
          </ul>
        </div>
        <div class="SOLModal-action">
          <button type="button" class="SOLBtn-root s--lg t--contained">
            확인
          </button>
        </div>
