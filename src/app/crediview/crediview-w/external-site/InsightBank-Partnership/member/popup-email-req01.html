  <body>
    <!-- Modal start -->
    <div class="SOLModal-root s--md">
      <div class="SOLModal-backdrop"></div>
      <div class="SOLModal-box">
        <div class="SOLModal-title">
          <h3 class="SOLTitle-t2">이메일 발송</h3>
          <div class="SOLModal-close">
            <button type="button" class="SOLIconBtn-root">
              <i class="SOLIcon-root SOLIcon-close"></i>
              <span class="blind">Close</span>
            </button>
          </div>
        </div>
        <div class="SOLModal-content">
          <ul class="SOLModal-msgbox">
            <li>기업경영진단보고서 자료 전달을 위한 정보를 입력해 주세요.</li>
          </ul>
          <div>
            <h4 class="SOLTitle-t3 pdb20">발송정보</h4>

            <table class="SOLTable-data">
              <tbody>
                <tr>
                  <th>기업명</th>
                  <td>테크핀더존주식회사</td>
                  <th>사업자등록번호</th>
                  <td>110-15-11111</td>
                </tr>
                <tr>
                  <th>발송이력</th>
                  <td colspan="3">
                    <ul class="table-con-list">
                      <li>
                        <span class="tit">메일 발송 성공</span>
                        <ul class="depth02">
                          <li>
                            <span>
                              2024년 12월 20일 03시 25분 39초<br />
                              김테크(kkk@asdfasdf.com)
                            </span>
                          </li>
                          <li>
                            <span>
                              2024년 12월 20일 03시 25분 39초<br />
                              김더존(douzone@asdfasdf.com)
                            </span>
                          </li>
                        </ul>
                      </li>
                    </ul>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div>
            <h4 class="SOLTitle-t3 pdb20">수신대상</h4>
            <table class="SOLTable-list">
              <thead>
                <tr>
                  <th>이름</th>
                  <th>이메일 주소</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>
                    <label class="SOLInput-root s--m">
                      <div class="SOLInput-box">
                        <input
                          type="text"
                          placeholder="이름을 입력하세요."
                          value=""
                          class="SOLInput-field"
                        />
                        <span class="SOLInput-wrap">
                          <span class="SOLInput-wrap--hidden">
                            <button
                              type="button"
                              class="SOLInput-btn SOLIcon-close"
                            >
                              <span class="blind">Del</span>
                            </button>
                          </span>
                          <!-- <button type="button" class="SOLBtn-root t--outlined" disabled="true">
                                  확인완료
                                </button> -->
                        </span>
                      </div>
                    </label>
                  </td>
                  <td>
                    <label class="SOLInput-root s--m">
                      <div class="SOLInput-box">
                        <input
                          type="text"
                          placeholder="이메일을 입력하세요."
                          value=""
                          class="SOLInput-field"
                        />
                        <span class="SOLInput-wrap">
                          <span class="SOLInput-wrap--hidden">
                            <button
                              type="button"
                              class="SOLInput-btn SOLIcon-close"
                            >
                              <span class="blind">Del</span>
                            </button>
                          </span>
                          <button
                            type="button"
                            class="SOLBtn-root t--contained"
                          >
                            발송
                          </button>
                        </span>
                      </div>
                    </label>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="SOLModal-action">
          <button type="button" class="SOLBtn-root s--lg t--outlined">
            닫기
          </button>
        </div>
      </div>
    </div>
    <!-- Modal end -->
