<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="always" />
    <meta name="format-detection" content="telephone=no,address=no,email=no" />
    <title>크레디뷰 웹(인사이트뱅크제휴)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="Description" content="" />
    <meta name="keywords" content="" />
    <meta name="Classification" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="크레디뷰" />
    <meta property="og:image" content="/Crediview.jpg" />
    <meta property="og:description" content="" />
    <meta property="og:url" content="웹사이트주소" />
    <meta property="al:web:url" content="웹사이트주소" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="웹사이트주소" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/crediview/crediview-w/css/crediview.css" />
  </head>

  <body>
    <div class="insightBank-member-root">
      <div class="insightBank-header-root">
        <div class="header-top">
          <div class="insightBank-header-wrap">
            <h1 class="logo">
              <a href="/">
                <span class="blind">크레디뷰 로고</span>
              </a>
            </h1>
          </div>
        </div>
      </div>

      <div class="members-container">
        <div class="member-tit-box">
          <span class="tit">크레디뷰 회원가입</span>
          <span class="desc"
            >기업경영진단보고서 확인을 위해 크레디뷰를 가입해 주세요.</span
          >
        </div>

        <ul class="SOLStepper-isbank-root">
          <li class="active">
            <span class="ic"></span>
            <span class="step01 tit">정보입력</span>
          </li>
          <li>
            <span class="ic"></span>
            <span class="step02 tit">약관동의</span>
          </li>
          <li>
            <span class="ic"></span>
            <span class="step02 tit">가입완료</span>
          </li>
        </ul>

        <div class="members-loginbox">
          <div class="loginbox-title center">
            <h3 class="SOLTitle-t2">본인인증 및 정보입력</h3>
          </div>
          <form method="post">
            <div class="loginbox-inputs">
              <!-- input group -->
              <div class="loginbox-inputs-group">
                <!-- input group -->
                <div class="loginbox-inputs-group">
                  <label class="SOLInput-root s--lg">
                    <span class="SOLInput-label">사업자등록번호</span>
                    <div class="SOLInput-box">
                      <input
                        type="text"
                        placeholder="비밀번호를 입력하세요."
                        value="370-88-02545"
                        class="SOLInput-field"
                        disabled="true"
                      />
                    </div>
                  </label>
                </div>

                <label class="SOLInput-root s--lg">
                  <span class="SOLInput-label">이메일주소</span>
                  <div class="SOLInput-box">
                    <input
                      type="text"
                      title=""
                      placeholder="비밀번호를 다시 입력하세요."
                      value="kim64512@tech.com"
                      class="SOLInput-field"
                    />
                    <span class="SOLInput-wrap">
                      <span class="SOLInput-wrap--hidden">
                        <button
                          type="button"
                          class="SOLInput-btn SOLIcon-close"
                        >
                          <span class="blind">Del</span>
                        </button>
                      </span>

                      <span class="SOLInput-icon"></span>
                      <button type="button" class="SOLBtn-root t--outlined">
                        인증번호 전송
                      </button>
                    </span>
                  </div>
                </label>
                <label class="SOLInput-root s--lg c--error">
                  <div class="SOLInput-box">
                    <input
                      type="text"
                      title="인증번호"
                      placeholder="인증번호를 입력하세요."
                      value=""
                      class="SOLInput-field"
                    />
                    <span class="SOLInput-wrap">
                      <span class="SOLInput-wrap--hidden">
                        <button
                          type="button"
                          class="SOLInput-btn SOLIcon-close"
                        >
                          <span class="blind">Del</span>
                        </button>
                      </span>
                      <span class="SOLInput-icon"></span>
                      <span class="SOLInput-count">03:22</span>
                      <button
                        type="button"
                        class="SOLBtn-root t--outlined"
                        style="width: 106px"
                        disabled=""
                      >
                        인증
                      </button>
                    </span>
                  </div>
                  <p class="SOLInput-msg c--error">인증번호는 필수입니다.</p>
                </label>
              </div>
              <!-- input group end -->

              <!-- input group -->
              <div class="loginbox-inputs-group">
                <label class="SOLInput-root s--lg c--error">
                  <span class="SOLInput-label">비밀번호</span>
                  <div class="SOLInput-box">
                    <input
                      type="password"
                      placeholder="비밀번호를 입력하세요."
                      class="SOLInput-field"
                    />
                    <span class="SOLInput-wrap">
                      <span class="SOLInput-wrap--hidden">
                        <button
                          type="button"
                          class="SOLInput-btn SOLIcon-close"
                        >
                          <span class="blind">Del</span>
                        </button>
                      </span>
                      <span class="SOLInput-icon"></span>
                    </span>
                  </div>
                  <p class="SOLInput-msg c--error">비밀번호는 필수입니다.</p>
                </label>
                <label class="SOLInput-root s--lg c--error">
                  <div class="SOLInput-box">
                    <input
                      type="password"
                      placeholder="비밀번호를를 다시 입력해주세요."
                      class="SOLInput-field"
                    />
                    <span class="SOLInput-wrap">
                      <span class="SOLInput-wrap--hidden">
                        <button
                          type="button"
                          class="SOLInput-btn SOLIcon-close"
                        >
                          <span class="blind">Del</span>
                        </button>
                      </span>
                      <span class="SOLInput-icon"></span>
                    </span>
                  </div>
                  <p class="SOLInput-msg c--error">
                    비밀번호와 확인 비밀번호가 일치하지 않습니다.
                  </p>
                </label>
              </div>
              <!-- input group end -->

              <label class="SOLInput-root s--lg c--error">
                <span class="SOLInput-label">담당자 정보</span>
                <div class="SOLInput-box">
                  <input
                    type="text"
                    placeholder="담당자 이름을 입력하세요."
                    class="SOLInput-field"
                  />
                  <span class="SOLInput-wrap">
                    <span class="SOLInput-wrap--hidden">
                      <button type="button" class="SOLInput-btn SOLIcon-close">
                        <span class="blind">Del</span>
                      </button>
                    </span>
                    <span class="SOLInput-icon"></span>
                  </span>
                </div>

                <p class="SOLInput-msg c--error">담당자 이름은 필수입니다.</p>
              </label>
            </div>

            <div class="loginbox-action">
              <button type="button" class="SOLBtn-root s--xl t--outlined">
                취소
              </button>
              <button
                type="button"
                class="SOLBtn-root s--xl t--contained"
                disabled
              >
                다음
              </button>
            </div>

            <p class="member-infor-txt">
              본 서비스는 기업신용평가사 테크핀레이팅스가<br />
              제공하는 ‘크레디뷰’ 서비스의 회원가입을 위한 절차입니다.
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
