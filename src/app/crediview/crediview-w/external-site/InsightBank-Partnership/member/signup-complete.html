  <body>
    <div class="insightBank-member-root">
      <div class="insightBank-header-root">
        <div class="header-top">
          <div class="insightBank-header-wrap">
            <h1 class="logo">
              <a href="/">
                <span class="blind">크레디뷰 로고</span>
              </a>
            </h1>
          </div>
        </div>
      </div>

      <div class="members-container height-f">
        <div class="member-tit-box">
          <span class="tit">크레디뷰 회원가입 완료</span>
        </div>

        <ul class="SOLStepper-isbank-root">
          <li class="active">
            <span class="ic"></span>
            <span class="step01 tit">정보입력</span>
          </li>
          <li class="active">
            <span class="ic"></span>
            <span class="step02 tit">약관동의</span>
          </li>
          <li class="active">
            <span class="ic"></span>
            <span class="step02 tit">가입완료</span>
          </li>
        </ul>

        <div class="members-loginbox">
          <form method="post">
            <div class="complete-desc-box">
              <div class="tit-box">
                <span class="tit">
                  크레디뷰 회원으로<br />
                  <em>가입이 완료되었습니다.</em>
                </span>
              </div>

              <div class="grade-box">
                <span class="grade">크레디뷰 회원등급 : 일반회원</span>
              </div>
              <span class="infor-txt">
                가입된 정보로 크레디뷰 사이트에서 서비스 이용이 가능합니다.
              </span>
            </div>

            <div class="loginbox-action">
              <button type="button" class="SOLBtn-root s--xl t--contained">
                확인
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
