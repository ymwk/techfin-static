<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="always" />
    <meta name="format-detection" content="telephone=no,address=no,email=no" />
    <title>크레디뷰 웹(인사이트뱅크제휴)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="Description" content="" />
    <meta name="keywords" content="" />
    <meta name="Classification" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="크레디뷰" />
    <meta property="og:image" content="/Crediview.jpg" />
    <meta property="og:description" content="" />
    <meta property="og:url" content="웹사이트주소" />
    <meta property="al:web:url" content="웹사이트주소" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="웹사이트주소" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/crediview/crediview-w/css/crediview.css" />
  </head>

  <body>
    <div class="insightBank-member-root">
      <div class="insightBank-header-root">
        <div class="header-top">
          <div class="insightBank-header-wrap">
            <h1 class="logo">
              <a href="/">
                <span class="blind">크레디뷰 로고</span>
              </a>
            </h1>
          </div>
        </div>
      </div>

      <div class="members-container">
        <div class="member-tit-box">
          <span class="tit">기업경영진단보고서 조회</span>
          <span class="subtitle">
            기업경영진단보고서 조회를 위한 이용약관에 동의해 주세요.
          </span>
        </div>

        <div class="members-loginbox">
          <div class="loginbox-title center">
            <h3 class="SOLTitle-t2">이용약관 동의</h3>
          </div>
          <form method="post">
            <ul class="loginbox-terms-list">
              <li class="all-check">
                <div class="SOLCheck-root">
                  <label class="SOLCheck-label">
                    <input type="checkbox" name="" / checked>
                    <span class="f-bold">전체 동의하기</span>
                  </label>
                </div>
              </li>
              <li>
                <div class="SOLCheck-root">
                  <label class="SOLCheck-label">
                    <input type="checkbox" name="" / checked>
                    <span
                      ><em>[필수] </em>기업경영진단보고서 서비스 이용약관</span
                    >
                  </label>
                </div>
                <button type="button" class="SOLIconBtn-root">
                  <i class="SOLIcon-root SOLIcon-gt--r"></i
                  ><span class="blind">보기</span>
                </button>
              </li>

              <li>
                <div class="SOLCheck-root">
                  <label class="SOLCheck-label">
                    <input type="checkbox" name="" / checked>
                    <span
                      >[선택] 기업경영진단보고서 자동 진단 및 알림 서비스
                      이용약관</span
                    >
                  </label>
                </div>
                <button type="button" class="SOLIconBtn-root">
                  <i class="SOLIcon-root SOLIcon-gt--r"></i
                  ><span class="blind">보기</span>
                </button>

                <div class="term-infor-desc">
                  <span class="txt">
                    * 자동 진단 신청 시 매월 보고서가 자동 발급되며<br />
                    가입된 계정의 이메일을 통해 안내드립니다.
                  </span>
                </div>
              </li>
            </ul>

            <div class="loginbox-action">
              <button type="button" class="SOLBtn-root s--xl t--outlined">
                취소
              </button>
              <button type="button" class="SOLBtn-root s--xl t--contained">
                동의 및 확인
              </button>
            </div>
            <p class="member-infor-txt">
              본 서비스는 기업신용평가사 테크핀레이팅스가<br />
              제공하는 ‘크레디뷰’ 서비스의 회원가입을 위한 절차입니다.
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
