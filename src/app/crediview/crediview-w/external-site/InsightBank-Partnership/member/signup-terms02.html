<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="always" />
  <meta name="format-detection" content="telephone=no,address=no,email=no" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

  <meta property="og:title" content="크레디뷰" />

  <link rel="stylesheet" href="/static/crediview/crediview-w/css/crediview.css" />
</head>

<body>
  <div class="insightBank-member-root">
    <div class="insightBank-header-root">
      <div class="header-top">
        <div class="insightBank-header-wrap">
          <h1 class="logo">
            <a href="/">
              <span class="blind">크레디뷰 로고</span>
            </a>
          </h1>
        </div>
      </div>
    </div>

    <div class="members-container">
      <div class="member-tit-box">
        <span class="tit">크레디뷰 회원가입</span>
        <span class="desc">AI경영진단보고서 확인을 위해 크레디뷰를 가입해 주세요.</span>
      </div>

      <ul class="SOLStepper-isbank-root">
        <li class="active">
          <span class="ic"></span>
          <span class="step01 tit">정보입력</span>
        </li>
        <li class="active">
          <span class="ic"></span>
          <span class="step02 tit">약관동의</span>
        </li>
        <li>
          <span class="ic"></span>
          <span class="step02 tit">가입완료</span>
        </li>
      </ul>

      <div class="members-loginbox">
        <div class="loginbox-title center">
          <h3 class="SOLTitle-t2">크레디뷰 약관동의</h3>
        </div>
        <form method="post">
          <ul class="loginbox-terms-list">
            <li class="all-check">
              <div class="SOLCheck-root">
                <label class="SOLCheck-label">
                  <input type="checkbox" name="" />
                  <span class="f-bold">전체 동의하기</span>
                </label>
              </div>
            </li>
            <li>
              <div class="SOLCheck-root">
                <label class="SOLCheck-label">
                  <input type="checkbox" name="" / checked>
                  <span><em>[필수] </em>개인정보 수집 및 이용에 관한 동의</span>
                </label>
              </div>
              <button type="button" class="SOLIconBtn-root">
                <i class="SOLIcon-root SOLIcon-gt--r"></i><span class="blind">보기</span>
              </button>
            </li>
            <li>
              <div class="SOLCheck-root">
                <label class="SOLCheck-label">
                  <input type="checkbox" name="" / checked>
                  <span><em>[필수] </em>기업정보 수집·활용·제3자 제공 동의</span>
                </label>
              </div>
              <button type="button" class="SOLIconBtn-root">
                <i class="SOLIcon-root SOLIcon-gt--r"></i><span class="blind">보기</span>
              </button>
            </li>
            <li>
              <div class="SOLCheck-root">
                <label class="SOLCheck-label">
                  <input type="checkbox" name="" / checked>
                  <span><em>[필수] </em>크레디뷰 서비스 이용약관</span>
                </label>
              </div>
              <button type="button" class="SOLIconBtn-root">
                <i class="SOLIcon-root SOLIcon-gt--r"></i><span class="blind">보기</span>
              </button>
            </li>
            <li>
              <div class="SOLCheck-root">
                <label class="SOLCheck-label">
                  <input type="checkbox" name="" />
                  <span>[선택] 마케팅 정보 수신 및 활용 동의</span>
                </label>
              </div>
              <button type="button" class="SOLIconBtn-root">
                <i class="SOLIcon-root SOLIcon-gt--r"></i><span class="blind">보기</span>
              </button>
            </li>
          </ul>

          <div class="loginbox-action">
            <button type="button" class="SOLBtn-root s--xl t--outlined">
              취소
            </button>
            <button type="button" class="SOLBtn-root s--xl t--contained">
              전체동의
            </button>
          </div>
          <p class="member-infor-txt">
            본 서비스는 기업신용평가사 테크핀레이팅스가<br />
            제공하는 ‘크레디뷰’ 서비스의 회원가입을 위한 절차입니다.
          </p>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
