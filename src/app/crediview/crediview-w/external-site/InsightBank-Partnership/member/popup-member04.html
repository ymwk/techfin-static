<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="always" />
    <meta name="format-detection" content="telephone=no,address=no,email=no" />
    <title>크레디뷰 웹</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="Description" content="" />
    <meta name="keywords" content="" />
    <meta name="Classification" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="크레디뷰" />
    <meta property="og:image" content="/Crediview.jpg" />
    <meta property="og:description" content="" />
    <meta property="og:url" content="웹사이트주소" />
    <meta property="al:web:url" content="웹사이트주소" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="웹사이트주소" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/crediview/crediview-w/css/crediview.css" />
  </head>
  <body>
    <!-- Confirm start -->
    <div class="SOLModal-root s--sm">
      <div class="SOLModal-backdrop"></div>
      <div class="SOLModal-box">
        <div class="SOLModal-title">
          <div class="SOLModal-close">
            <button type="button" class="SOLIconBtn-root">
              <i class="SOLIcon-root SOLIcon-close"></i>
              <span class="blind">Close</span>
            </button>
          </div>
        </div>
        <div class="SOLModal-content">
          <div class="SOLModal-terms-title">
            <h4 class="SOLTitle-t3">휴대폰 번호 인증</h4>
            <p>크레디뷰 이용을 위해 휴대폰 인증을 진행해 주세요.</p>
          </div>

          <div class="SOLModal-input-wrap">
            <label class="SOLInput-root s--lg">
              <div class="SOLInput-box">
                <input
                  type="text"
                  placeholder="휴대폰번호를 입력하세요."
                  value="01064166512"
                  class="SOLInput-field"
                  disabled
                />
                <span class="SOLInput-wrap">
                  <span class="SOLInput-wrap--hidden">
                    <button type="button" class="SOLInput-btn SOLIcon-close">
                      <span class="blind">Del</span>
                    </button>
                  </span>
                  <button
                    type="button"
                    class="SOLBtn-root t--outlined"
                    disabled
                  >
                    인증번호 전송
                  </button>
                </span>
              </div>
            </label>
            <label class="SOLInput-root s--lg">
              <div class="SOLInput-box">
                <input
                  type="text"
                  title="인증번호"
                  placeholder="인증번호를 입력하세요."
                  value="43344"
                  class="SOLInput-field"
                  disabled
                />
                <span class="SOLInput-wrap">
                  <span class="SOLInput-wrap--hidden">
                    <button type="button" class="SOLInput-btn SOLIcon-close">
                      <span class="blind">Del</span>
                    </button>
                  </span>
                  <span class="SOLInput-icon"></span>
                  <button
                    type="button"
                    class="SOLBtn-root t--outlined"
                    style="width: 106px"
                    disabled
                  >
                    인증
                  </button>
                </span>
              </div>
            </label>
          </div>
        </div>
        <div class="SOLModal-action">
          <button type="button" class="SOLBtn-root s--lg t--outlined">
            취소
          </button>
          <button type="button" class="SOLBtn-root s--lg t--contained">
            확인
          </button>
        </div>
      </div>
    </div>
    <!-- Confirm end -->
  </body>
</html>
