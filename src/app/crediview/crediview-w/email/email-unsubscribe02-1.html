<!DOCTYPE html>
<html lang="ko">
  <head>
    <title></title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  </head>

  <body>
    <!-- Start -->
    <table
      align="center"
      border="0"
      cellpadding="0"
      cellspacing="0"
      width="700"
      style="
        width: 700px;
        margin: 0 auto;
        text-align: left;
        border-spacing: 0;
        overflow: hidden;
      "
    >
      <tr>
        <td style="height: 40px"></td>
      </tr>
      <tr>
        <td>
          <div style="border: 1px solid #e2e2e2; border-radius: 12px">
            <table
              align="center"
              border="0"
              cellpadding="0"
              cellspacing="0"
              width="100%"
              style="
                width: 100%;
                margin: 0 auto;
                text-align: left;
                border-spacing: 0;
                overflow: hidden;
              "
            >
              <tr>
                <td style="width: 40px"></td>
                <td>
                  <table
                    align="center"
                    border="0"
                    cellpadding="0"
                    cellspacing="0"
                    width="100%"
                    style="
                      width: 100%;
                      margin: 0 auto;
                      text-align: left;
                      border-spacing: 0;
                      overflow: hidden;
                    "
                  >
                    <tr>
                      <td style="height: 40px"></td>
                    </tr>
                    <tr>
                      <td>
                        <img
                          src="/static/crediview/crediview-w/image/views/email/header_logo.png"
                          alt="Crediview"
                          width="620"
                          height="59"
                        />
                      </td>
                    </tr>

                    <tr>
                      <td
                        style="
                          font-weight: bold;
                          font-size: 24px;
                          letter-spacing: -2px;
                          padding-bottom: 15px;
                        "
                      >
                        메일 수신자 정보 확인을 위해 아래 정보를 입력바랍니다.
                      </td>
                    </tr>

                    <tr>
                      <td
                        style="
                          font-size: 14px;
                          color: #5e5e5e;
                          line-height: 1.5;
                        "
                      >
                        오기입 시, 정상적으로 처리되지 않을 수 있으니 완료 전
                        반드시 재확인 바랍니다.
                      </td>
                    </tr>

                    <tr>
                      <td style="height: 30px"></td>
                    </tr>

                    <tr>
                      <td>
                        <div
                          style="
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            gap: 0 10px;
                          "
                        >
                          <label
                            for=""
                            style="
                              font-size: 14px;
                              font-weight: 600;
                              color: #222;
                            "
                            >수신 이메일 주소</label
                          >
                          <div
                            style="
                              position: relative;
                              font-size: 14px;
                              height: 38px;
                              padding: 0 1em;
                              border: 1px solid rgb(10, 43, 88, 0.1);
                              border-radius: 4px;
                              background-color: #fff;
                              transition: border-color 0.2s;
                              color: #222;
                              text-align: left;
                              padding: 0;
                              flex: 1;
                            "
                          >
                            <input
                              type="text"
                              placeholder="이메일 주소를 입력해주세요."
                              style="
                                position: relative;
                                font-size: 14px;
                                width: 100%;
                                height: 100%;
                                padding: 0 1em;
                                border: 0;
                                background-color: transparent;
                                box-sizing: border-box;
                              "
                            />
                          </div>
                        </div>
                      </td>
                    </tr>

                    <tr>
                      <td style="height: 50px"></td>
                    </tr>
                    <tr>
                      <td style="text-align: center">
                        <div
                          style="
                            display: flex;
                            gap: 0 12px;
                            justify-content: center;
                            align-items: center;
                          "
                        >
                          <a
                            href="#서비스바로가기"
                            style="
                              display: inline-block;
                              width: 200px;
                              text-decoration: none;
                              color: #3b5dfb;
                              border-radius: 4px;
                              padding: 12px 0px;
                              background-color: #fff;
                              font-weight: bold;
                              font-size: 15px;
                              font-weight: 500;
                              border-radius: 4px;
                              border: 1px solid #3b5dfb;
                              background: #fff;
                            "
                          >
                            취소
                          </a>
                          <a
                            href="#서비스바로가기"
                            style="
                              display: inline-block;
                              width: 200px;
                              text-decoration: none;
                              color: #fff;
                              border-radius: 4px;
                              padding: 12px 0px;
                              background-color: #0046ff;
                              font-weight: bold;
                              font-size: 15px;
                            "
                          >
                            저장
                          </a>
                        </div>
                      </td>
                    </tr>
                    <tr>
                      <td style="height: 40px"></td>
                    </tr>
                  </table>
                </td>
                <td style="width: 40px"></td>
              </tr>
            </table>
          </div>
        </td>
      </tr>
      <tr>
        <td style="height: 30px"></td>
      </tr>
    </table>
    <!-- End -->
  </body>
</html>
