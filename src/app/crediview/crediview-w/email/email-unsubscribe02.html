<!DOCTYPE html>
<html lang="ko">
  <head>
    <title></title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  </head>

  <body>
    <!-- Start -->
    <table
      align="center"
      border="0"
      cellpadding="0"
      cellspacing="0"
      width="700"
      style="
        width: 700px;
        margin: 0 auto;
        text-align: left;
        border-spacing: 0;
        overflow: hidden;
      "
    >
      <tr>
        <td style="height: 40px"></td>
      </tr>
      <tr>
        <td>
          <div style="border: 1px solid #e2e2e2; border-radius: 12px">
            <table
              align="center"
              border="0"
              cellpadding="0"
              cellspacing="0"
              width="100%"
              style="
                width: 100%;
                margin: 0 auto;
                text-align: left;
                border-spacing: 0;
                overflow: hidden;
              "
            >
              <tr>
                <td style="width: 40px"></td>
                <td>
                  <table
                    align="center"
                    border="0"
                    cellpadding="0"
                    cellspacing="0"
                    width="100%"
                    style="
                      width: 100%;
                      margin: 0 auto;
                      text-align: left;
                      border-spacing: 0;
                      overflow: hidden;
                    "
                  >
                    <tr>
                      <td style="height: 40px"></td>
                    </tr>
                    <tr>
                      <td>
                        <img
                          src="/static/crediview/crediview-w/image/views/email/header_logo.png"
                          alt="Crediview"
                          width="620"
                          height="59"
                        />
                      </td>
                    </tr>
                    <tr>
                      <td
                        style="
                          font-weight: bold;
                          font-size: 24px;
                          letter-spacing: -2px;
                          padding-bottom: 20px;
                        "
                      >
                        크레디뷰 메일링 서비스를 이용해 주셔서 감사합니다.
                      </td>
                    </tr>

                    <tr>
                      <td
                        style="
                          font-size: 14px;
                          color: #5e5e5e;
                          line-height: 1.5;
                        "
                      >
                        크레디뷰에서 발송 드리는 뉴스(이벤트 프로모션 등) 이메일
                        수신거부를 선택하였습니다.<br />
                        추후 메일 수신을 원하지 않는 경우, 아래
                        <a
                          href="#"
                          type="button"
                          style="
                            display: inline-block;
                            color: #0046ff;
                            font-size: 13px;
                            font-weight: 700;
                            text-decoration: none;
                            padding: 0 0;
                            cursor: pointer;
                          "
                        >
                          [수신거부]
                        </a>
                        버튼을 클릭하여 주십시오.
                      </td>
                    </tr>
                    <tr>
                      <td style="height: 112px"></td>
                    </tr>
                    <tr>
                      <td style="text-align: center">
                        <div
                          style="
                            display: flex;
                            gap: 0 12px;
                            justify-content: center;
                            align-items: center;
                          "
                        >
                          <a
                            href="#서비스바로가기"
                            style="
                              display: inline-block;
                              width: 200px;
                              text-decoration: none;
                              color: #3b5dfb;
                              border-radius: 4px;
                              padding: 12px 0px;
                              background-color: #fff;
                              font-weight: bold;
                              font-size: 15px;
                              font-weight: 500;
                              border-radius: 4px;
                              border: 1px solid #3b5dfb;
                              background: #fff;
                            "
                          >
                            취소
                          </a>
                          <a
                            href="#서비스바로가기"
                            style="
                              display: inline-block;
                              width: 200px;
                              text-decoration: none;
                              color: #fff;
                              border-radius: 4px;
                              padding: 12px 0px;
                              background-color: #0046ff;
                              font-weight: bold;
                              font-size: 15px;
                            "
                          >
                            수신거부
                          </a>
                        </div>
                      </td>
                    </tr>
                    <tr>
                      <td style="height: 40px"></td>
                    </tr>
                  </table>
                </td>
                <td style="width: 40px"></td>
              </tr>
            </table>
          </div>
        </td>
      </tr>
      <tr>
        <td style="height: 30px"></td>
      </tr>
    </table>
    <!-- End -->
  </body>
</html>
