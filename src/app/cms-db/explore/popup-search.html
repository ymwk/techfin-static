<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--md">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">데이터 스튜디오 조회</h2>
        </div>

        <div class="modal-contents">
          
          <div class="font-h4">총 <em class="c--primary">5,124</em>의 기업이 검색되었습니다.</div>
          
          <ul class="box-panel explore-result-list">
            <li>
              <span class="name">잔여 사용량</span>
              <span>
                <span class="value">37,340 건</span>
                <span> / 연</span>
              </span>
            </li>
            <li>
              <span class="name">차감 후 사용량</span>
              <span>
                <span class="value">37,340 건</span>
                <span> / 건</span>
              </span>
            </li>
          </ul>
          
          <div class="msg-box">
            <ul class="msg-list">
              <li>데이터 조회 즉시 가입된 플랜의 사용량에서 차감되며 취소할 수 없습니다.</li>
            </ul>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-comm">
              <span>취소</span>
            </button>
            <button type="button" class="btn-contained">
              <span>조회하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
