<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="alert-root">
      <div class="alert-backdrop"></div>
      <div class="alert-box">
        <div class="alert-contents">
          <div class="alert-icons">
            <i class="icon-comm i--warn t--alert"></i>
          </div>
          <div class="alert-msg">
            <p class="font-h4">사용량 초과 안내</p>
            <p>
              현재 플랜의 사용량을 모두 이용했습니다.<br />
              YYYY.MM.DD 기준으로 플랜 사용량이 초기화됩니다.<br />
              추가 조회를 원하는 경우 플랜 변경이 필요합니다.
            </p>
          </div>
        </div>
        <div class="alert-action">
          <button type="button" class="btn-contained">
            <span>확인</span>
          </button>
        </div>
      </div>
    </div>
    <!-- //alert-root -->
  </body>
</html>
