<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--md">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">템플릿 저장하기</h2>
        </div>

        <div class="modal-contents">
          <div class="msg-box">
            <ul class="msg-list">
              <li>현재 구성한 필드 설정을 저장합니다.</li>
              <li>저장된 템플릿은 ‘마이페이지 > 스크랩 관리 > 저장 템플릿'에서 할 수 있습니다.</li>
            </ul>
          </div>

          <table class="table-rows table-form">
            <tbody>
              <tr>
                <th><span class="require">템플릿명</span></th>
                <td>
                  <div class="textfield-root ac--invalid">
                    <label class="textfield-label">
                      <input
                        type="text"
                        class="textfield-form"
                        name=""
                        placeholder="템플릿명 입력"
                      />
                    </label>
                    <p class="textfield-msg">템플릿명을 입력해 주세요.</p>
                  </div>
                </td>
              </tr>
              <tr>
                <th>설명</th>
                <td>
                  <div class="textfield-root">
                    <label class="textfield-label">
                      <input
                        type="text"
                        class="textfield-form"
                        name=""
                        placeholder="설명 입력"
                      />
                    </label>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>

        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained" >
              <span>저장하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
