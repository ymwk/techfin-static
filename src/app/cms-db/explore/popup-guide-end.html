<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--md t--menual">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>

        <div class="modal-contents">
          <div class="search-empty">
            <i class="icon-comm i--empty-class"></i>
            <p class="tit">준비가 끝났습니다!</p>
            <p>
              이제 자유롭게 템플릿과 탐색 조건을 활용하여<br />
              원하는 기업의 재무 데이터를 확인해 보세요.
            </p>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained">
              <span>데이터 스튜디오 시작하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
