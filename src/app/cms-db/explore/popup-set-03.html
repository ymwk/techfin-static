<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--lg">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">기준정보 설정</h2>
        </div>

        <div class="modal-contents">
          <div class="box-panel filter-box">
            <div class="filter-tabs">
              <div class="filter-scroll">
                <div class="radiochk-root t--list t--checkicon t--reverse">
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>기업기본정보</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>기업규모</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>기업구분</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" checked />
                    <span>상장여부</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>외감여부</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>신용등급</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>EWS등급</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>업종</span>
                  </label>
                  <label class="radiochk-label">
                    <input type="radio" name="selectGroup" />
                    <span>지역</span>
                  </label>
                </div>
              </div>
            </div>
            <div class="filter-cont">
              <div class="filter-cont-scroll">
                <div class="filter-scroll">
                  <div class="radiochk-root t--list t--reverse t--checkicon s--sm">
                    <label class="radiochk-label">
                      <input type="radio" name="radioGroup" checked />
                      <span>전체</span>
                    </label>

                    <label class="radiochk-label">
                      <input type="radio" name="radioGroup" />
                      <span>상장</span>
                    </label>

                    <label class="radiochk-label">
                      <input type="radio" name="radioGroup" />
                      <span>비상장</span>
                    </label>
                  </div>
                </div>
                <!-- // filter-scroll -->
              </div>
              <!-- // filter-cont-scroll -->
            </div>
            <!-- // filter-cont -->
          </div>
          <!-- // box-panel
            -->
          <div class="filter-footer">
            <div class="filter-chip-list">
              <button class="btn-chip">
                <span>업종</span>
                <i class="icon-comm i--close s--sm"></i>
                <span class="blind">삭제</span>
              </button>

              <button class="btn-chip">
                <span>기업 기본정보</span>
                <i class="icon-comm i--close s--sm"></i>
                <span class="blind">삭제</span>
              </button>
            </div>

            <button type="button" class="btn-text">
              <i class="icon-comm i--refresh s--sm"></i>
              <span>초기화</span>
            </button>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained">
              <span>적용</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
