<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--md t--menual">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>

        <div class="modal-contents">
          <div class="search-empty">
            <i class="icon-comm i--empty-company"></i>
            <p class="tit">데이터 스튜디오 사용이 처음이신가요?</p>
            <p>복잡한 재무데이터를 한눈에 확인하고,<br />탐색 목적에 맞는 기업 찾는 법을 30초 만에 알려드릴게요!</p>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-comm">
              <span>나중에 할게요</span>
            </button>
            <button type="button" class="btn-contained">
              <span>가이드 시작하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
