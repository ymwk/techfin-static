<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--lg">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">현금영수증/전자세금계산서 발급신청</h2>
        </div>

        <div class="modal-contents">
          <h3 class="font-h4">발급정보</h3>

          <div>
            <div class="radiocheck-root t--btns">
              <label class="radiocheck-label">
                <input type="radio" name="selectGroup" />
                <span>전자세금계산서</span>
              </label>
              <label class="radiocheck-label">
                <input type="radio" name="selectGroup" checked />
                <span>현금영수증</span>
              </label>
            </div>
          </div>

          <h3 class="font-h4 mt10">회사정보</h3>
          <div class="table-wrap">
            <table class="table-rows">
              <tbody>
                <tr>
                  <th>기업명</th>
                  <td>주식회사테크핀레이팅스</td>
                </tr>
                <tr>
                  <th>사업자등록번호</th>
                  <td>123-45-13456</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained">
              <span>신청하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
