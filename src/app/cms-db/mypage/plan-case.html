<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>크레디뷰 기업DB조회</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
    <style>
      .tmp {
        display: flex;
        flex-direction: column;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="tmp">
      <div class="planlist-wrap">
        <div class="planlist-box">
          <div class="progress-wrap legend-03">
            <div class="label">
              <span class="tit">
                <i class="icon-comm i--account"></i>
                <span>이용 가능 계정</span>
              </span>
              <span><em>5</em>/10</span>
            </div>
            <div class="progressbar">
              <div class="value" style="width: 75%"></div>
            </div>
          </div>
          <div class="cont">
          <p class="desc">계정은 <a href="#" class="link-underline">권한 관리</a>에서 할당할 수 있습니다.</p>
          </div>
        </div>
        <!-- // planlist-box -->

        <div class="planlist-box">
          <div class="progress-wrap legend-03">
            <div class="label">
              <span class="tit">
                <i class="icon-comm i--account"></i>
                <span>이용 가능 계정</span>
              </span>
              <span><em>10</em>/10</span>
            </div>
            <div class="progressbar">
              <div class="value" style="width: 100%"></div>
            </div>
          </div>
          <div class="cont">
            <p class="desc">이용 가능 계정을 모두 이용했습니다.</p>
            <button type="button" class="btn-text s--mmd">
              <span>플랜 변경</span>
              <i class="icon-comm i--gt-r s--sm"></i>
            </button>
          </div>
        </div>
        <!-- // planlist-box -->
      </div>

      <div class="planlist-wrap">
        

        <div class="planlist-box">
          <div class="progress-wrap legend-04">
            <div class="label">
              <span class="tit">
                <i class="icon-comm i--company"></i>
                <span>기업조회</span>
              </span>
              <span><em>762</em>/1,000</span>
            </div>
            <div class="progressbar">
              <div class="value" style="width: 76%"></div>
            </div>
          </div>
          <p class="desc">현재 플랜의 <em>76%</em> 이용했습니다.</p>
        </div>
        <!-- // planlist-box -->
         
        <div class="planlist-box">
          <div class="progress-wrap legend-04">
            <div class="label">
              <span class="tit">
                <i class="icon-comm i--company"></i>
                <span>기업조회</span>
              </span>
              <span><em>1,000</em>/1,000</span>
            </div>
            <div class="progressbar">
              <div class="value" style="width: 100%"></div>
            </div>
          </div>
          <div class="cont">
            <p class="desc">현재 플랜의 사용량을 모두 이용했습니다.</p>
            <button type="button" class="btn-text s--mmd">
              <span>플랜 변경</span>
              <i class="icon-comm i--gt-r s--sm"></i>
            </button>
          </div>
        </div>
        <!-- // planlist-box -->
      </div>

      <div class="planlist-wrap">
        <div class="planlist-box">
          <div class="progress-wrap legend-05">
            <div class="label">
              <span class="tit">
                <i class="icon-comm i--doc-gr"></i>
                <span>데이터 스튜디오</span>
              </span>
              <span><em>0</em>/1,000</span>
            </div>
            <div class="progressbar">
              <div class="value" style="width: 0%"></div>
            </div>
          </div>
          <div class="cont">
            <p class="desc">현재 플랜의 <em>0%</em> 이용했습니다.</p>
            
          </div>
        </div>
        <!-- // planlist-box -->

        <div class="planlist-box">
          <div class="progress-wrap legend-05">
            <div class="label">
              <span class="tit">
                <i class="icon-comm i--doc-gr"></i>
                <span>데이터 스튜디오</span>
              </span>
              <span><em>1,000</em>/1,000</span>
            </div>
            <div class="progressbar">
              <div class="value" style="width: 76%"></div>
            </div>
          </div>
          <div class="cont">
            <p class="desc">현재 플랜의 사용량을 모두 이용했습니다.</p>
            <button type="button" class="btn-text s--mmd">
              <span>플랜 변경</span>
              <i class="icon-comm i--gt-r s--sm"></i>
            </button>
          </div>
        </div>
        <!-- // planlist-box -->

        <div class="planlist-box">
          <div class="progress-wrap legend-05">
            <div class="label">
              <span class="tit">
                <i class="icon-comm i--lock-g"></i>
                <span>데이터 스튜디오</span>
              </span>
              <button type="button" class="btn-text s--mmd">
                <span>플랜 문의하기</span>
                <i class="icon-comm i--gt-r s--sm"></i>
              </button>
            </div>
            <div class="empty">플랜 미제공 서비스</div>
          </div>

          <p class="desc">Enterprise 플랜 상담이 필요합니다.</p>
        </div>
        <!-- // planlist-box -->
      </div>
    </div>

    <script src="../js/custom.js"></script>
  </body>
</html>
