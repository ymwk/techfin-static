<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--lg">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">플랜 변경 문의하기</h2>
        </div>

        <div class="modal-contents">
          <h3 class="font-h4">현재 이용중인 플랜</h3>

          <div class="box-panel plan-price-box">
            <span class="font-h3">PRO</span>
            <span class="price">
              <em>240,000원</em>
              <span>/ 월정기</span>
            </span>
          </div>

          <div class="modal-headline">
            <h3 class="font-h4">플랜 변경</h3>
            <p>원하는 플랜을 선택해 주세요.</p>
          </div>

          <div class="radiocheck-list t--plan">
            <label class="radiocheck-label item">
              <input type="radio" name="selectGroup" />
              <div class="cont">
                <div class="title">
                  <span class="font-h3">Lite</span>
                </div>
                <ul class="list">
                  <li>
                    <em>기업조회</em>
                    <span style="min-width: 72px">월 100개</span>
                  </li>
                  <li>
                    <em>이용 가능 계정 수</em>
                    <span style="min-width: 40px">1개</span>
                  </li>
                </ul>
              </div>
            </label>

            <label class="radiocheck-label item">
              <input type="radio" name="selectGroup" />
              <div class="cont">
                <div class="title">
                  <span class="font-h3">Standard</span>
                </div>
                <ul class="list">
                  <li>
                    <em>기업조회</em>
                    <span style="min-width: 72px">월 500개</span>
                  </li>
                  <li>
                    <em>이용 가능 계정 수</em>
                    <span style="min-width: 40px">5개</span>
                  </li>
                </ul>
              </div>
            </label>

            <label class="radiocheck-label item">
              <input type="radio" name="selectGroup" />
              <div class="cont">
                <div class="title">
                  <span class="font-h3">Pro</span>
                </div>
                <ul class="list">
                  <li>
                    <em>기업조회</em>
                    <span style="min-width: 72px">월 1,000개</span>
                  </li>
                  <li>
                    <em>이용 가능 계정 수</em>
                    <span style="min-width: 40px">10개</span>
                  </li>
                </ul>
              </div>
            </label>

            <label class="radiocheck-label item">
              <input type="radio" name="selectGroup" />
              <div class="cont">
                <div class="title">
                  <span class="font-h3">Business</span>
                </div>
                <ul class="list">
                  <li>
                    <em>기업조회</em>
                    <span style="min-width: 72px">월 2,000개</span>
                  </li>
                  <li>
                    <em>이용 가능 계정 수</em>
                    <span style="min-width: 40px">20개</span>
                  </li>
                </ul>
              </div>
            </label>

            <label class="radiocheck-label item">
              <input type="radio" name="selectGroup" />
              <div class="cont">
                <div class="title">
                  <span class="font-h3">Enterprise</span>
                </div>
                <ul class="list">
                  <li>
                    <span>기업별 맞춤형 사용량 선택 가능</span>
                  </li>
                  <li>
                    <em>엔터프라이즈 이용 가능 계정 수</em>
                    <span style="min-width: 40px">무제한</span>
                  </li>
                </ul>

                <ul class="plan-enter-list">
                  <li>
                    <div class="modal-headline">
                      <span class="font-h5">기업조회</span>
                      <p>현재 1,000건 이용가능</p>
                    </div>
                    <div class="radiocheck-root t--btns s--sm">
                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup1" checked />
                        <span>1,200건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup1" />
                        <span>6,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup1" />
                        <span>12,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup1" />
                        <span>24,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup1" />
                        <span>무제한</span>
                      </label>
                    </div>
                  </li>

                  <li>
                    <div class="modal-headline">
                      <span class="font-h5">데이터스튜디오</span>
                      <p>서비스 미이용</p>
                    </div>
                    <div class="radiocheck-root t--btns s--sm">
                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup2" checked />
                        <span>40,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup2" />
                        <span>100,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup2" />
                        <span>200,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup2" />
                        <span>무제한</span>
                      </label>
                    </div>
                  </li>

                  <li>
                    <div class="modal-headline">
                      <span class="font-h5">사기거래탐지</span>
                      <p>서비스 미이용</p>
                    </div>
                    <div class="radiocheck-root t--btns s--sm">
                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup3" checked />
                        <span>1,200건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup3" />
                        <span>6,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup3" />
                        <span>12,000건/연</span>
                      </label>

                      <label class="radiocheck-label item">
                        <input type="radio" name="radioGroup3" />
                        <span>무제한</span>
                      </label>
                    </div>
                  </li>
                </ul>
              </div>
            </label>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained">
              <span>플랜 문의하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
