<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--md">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">플랜 변경 문의하기</h2>
        </div>

        <div class="modal-contents">
          <h3 class="font-h4">현재 이용중인 플랜</h3>

          <div class="box-panel plan-price-box">
            <span class="font-h3">Pro</span>
            <span class="price">
              <em>240,000원</em>
              <span>/월정기</span>
            </span>
          </div>

          <h3 class="font-h4 mt8">플랜 설정</h3>
          <p class="font-md c--gray1">추가로 필요한 서비스나 사용량을 설정해 주세요.</p>

          <ul class="box-panel plan-service-list s--sm">
            <li>
              <div class="cont">
                <span class="tit">이용 계정</span>
                <p>현재 10개 이용가능</p>
              </div>
              <div class="utils">
                <div class="radiocheck-root">
                  <label class="radiocheck-label">
                    <input type="checkbox" name="" />
                    <span>무제한 이용</span>
                  </label>
                </div>

                <div class="textfield-root">
                  <label class="textfield-label">
                    <input type="text" class="textfield-form" name="" placeholder="사용량" value="10"/>
                    <span>개</span>
                  </label>
                </div>
              </div>
            </li>
            
            <li>
              <div class="cont">
                <span class="tit">기업상세조회</span>
                <p>현재 1,000건 이용가능</p>
              </div>
              <div class="utils">
                <div class="radiocheck-root">
                  <label class="radiocheck-label">
                    <input type="checkbox" name="" checked/>
                    <span>무제한 이용</span>
                  </label>
                </div>

                <div class="textfield-root">
                  <label class="textfield-label">
                    <input type="text" class="textfield-form" name="" placeholder="사용량" disabled/>
                    <span>개</span>
                  </label>
                </div>
              </div>
            </li>
            
            <li>
              <div class="cont">
                <span class="tit">데이터 스튜디오</span>
                <p>서비스 미이용</p>
              </div>
              <div class="utils">
                <div class="radiocheck-root">
                  <label class="radiocheck-label">
                    <input type="checkbox" name="" />
                    <span>무제한 이용</span>
                  </label>
                </div>

                <div class="textfield-root">
                  <label class="textfield-label">
                    <input type="text" class="textfield-form" name="" placeholder="사용량" />
                    <span>개</span>
                  </label>
                </div>
              </div>
            </li>
            
            <li>
              <div class="cont">
                <span class="tit">사기거래탐지</span>
                <p>서비스 미이용</p>
              </div>
              <div class="utils">
                <div class="radiocheck-root">
                  <label class="radiocheck-label">
                    <input type="checkbox" name="" />
                    <span>서비스 이용</span>
                  </label>
                </div>
              </div>
            </li>
          </ul>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained">
              <span>플랜 문의하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
