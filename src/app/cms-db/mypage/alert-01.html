<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="alert-root">
      <div class="alert-backdrop"></div>
      <div class="alert-box">
        <div class="alert-contents">
          <div class="alert-icons">
            <i class="icon-comm i--err t--alert"></i>
          </div>
          <div class="alert-msg">
            <p class="font-h4">플랜 해지 안내</p>
            <p>
              플랜 해지는 담당자 확인 후 순차적으로 처리됩니다.<br />
              업무일 기준 최대 3~5일 소요될 수 있습니다.<br>
              플랜을 해지하시겠습니까?
            </p>
          </div>
        </div>
        <div class="alert-action">
          <button type="button" class="btn-comm">
            <span>아니요</span>
          </button>
          <button type="button" class="btn-contained">
            <span>에</span>
          </button>
        </div>
      </div>
    </div>
    <!-- //alert-root -->
  </body>
</html>
