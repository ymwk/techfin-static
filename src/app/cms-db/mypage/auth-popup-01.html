<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--md">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">서비스 이용 권한 설정</h2>
        </div>

        <div class="modal-contents">
          <ul class="box-panel explore-result-list">
            <li>
              <span class="name">잔여 이용가능 계정</span>
              <span>
                <span class="value">0</span>
                <span>개</span>
              </span>
            </li>
            <li>
              <span class="name">총 이용가능 계정</span>
              <span>
                <span class="value">10</span>
                <span>개</span>
              </span>
            </li>
          </ul>

          <h3 class="font-h4 mt10">서비스 이용대기</h3>

          <div class="switch-wrap t--grid">
            <label class="switch-root">
              <span class="switch-label">박더존</span>
              <input type="checkbox" name=""  />
              <div class="cont">mspark@tech.com</div>
            </label>

            <label class="switch-root">
              <span class="switch-label">정더존</span>
              <input type="checkbox" name=""  />
              <div class="cont">mspark@tech.com</div>
            </label>
          </div>
          
          <h3 class="font-h4 mt10">서비스 이용중</h3>

          <div class="switch-wrap t--grid">
            <label class="switch-root">
              <span class="switch-label">박더존</span>
              <input type="checkbox" name="" checked />
              <div class="cont">mspark@tech.com</div>
            </label>

            <label class="switch-root">
              <span class="switch-label">정더존</span>
              <input type="checkbox" name="" checked />
              <div class="cont">mspark@tech.com</div>
            </label>
            
            <label class="switch-root">
              <span class="switch-label">박더존</span>
              <input type="checkbox" name="" checked />
              <div class="cont">mspark@tech.com</div>
            </label>

            <label class="switch-root">
              <span class="switch-label">정더존</span>
              <input type="checkbox" name="" checked />
              <div class="cont">mspark@tech.com</div>
            </label>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained">
              <span>변경하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
