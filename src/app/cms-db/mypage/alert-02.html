<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="alert-root">
      <div class="alert-backdrop"></div>
      <div class="alert-box">
        <div class="alert-contents">
          <div class="alert-icons">
            <i class="icon-comm i--check t--alert"></i>
          </div>
          <div class="alert-msg">
            <p class="font-h4">플랜 변경 문의가 접수되었습니다.</p>
            <p>
              담당자 확인 후 순차적으로 연락드립니다.<br />
              추가 문의사항이 있을 경우 대표전화(1660-3832)로<br />
              문의해 주세요.
            </p>
          </div>
        </div>
        <div class="alert-action">
          <button type="button" class="btn-contained">
            <span>확인</span>
          </button>
        </div>
      </div>
    </div>
    <!-- //alert-root -->
  </body>
</html>
