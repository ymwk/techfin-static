<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="alert-root">
      <div class="alert-backdrop"></div>
      <div class="alert-box">
        <div class="alert-contents">
          <div class="alert-icons">
            <i class="icon-comm i--warn t--alert"></i>
          </div>
          <div class="alert-msg">
            <p class="font-h4">서비스 이용 신청</p>
            <p>
              현재 이용 가능한 계정 수를 모두 이용중입니다.<br />
              관리자에게 서비스 이용 권한을 요청하시겠습니까?
            </p>
          </div>
        </div>
        <div class="alert-action">
          <button type="button" class="btn-comm">
            <span>아니요</span>
          </button>
          <button type="button" class="btn-contained">
            <span>예</span>
          </button>
        </div>
      </div>
    </div>
    <!-- //alert-root -->
  </body>
</html>
