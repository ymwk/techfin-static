<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="alert-root">
      <div class="alert-backdrop"></div>
      <div class="alert-box">
        <div class="alert-contents">
          <div class="alert-icons">
            <i class="icon-comm i--err t--alert"></i>
          </div>
          <div class="alert-msg">
            <p class="font-h4">서비스 이용동의를 취소하시겠습니까?</p>
            <p>
              동의 후 다양한 기업 데이터를 조회할 수 있습니다.<br>
              이용동의를 취소할 경우 크레디뷰로 이동합니다.
            </p>
          </div>
        </div>
        <div class="alert-action">
          <button type="button" class="btn-comm">
            <span>아니요</span>
          </button>
          <button type="button" class="btn-contained">
            <span>예</span>
          </button>
        </div>
      </div>
    </div>
    <!-- //alert-root -->
  </body>
</html>
