<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>투자기업관리플랫폼</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/cms-monitoring/css/index.css" />
  </head>
  <body>
    <div class="modal-root s--md">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <button type="button" class="modal-close">
          <i class="icon-comm i--close s--lg"></i>
          <span class="blind">Close</span>
        </button>
        <div class="modal-header">
          <h2 class="font-h3">기업DB조회 서비스 이용동의</h2>
        </div>

        <div class="modal-contents">
          <div class="msg-box">
            <ul class="msg-list">
              <li>본 서비스는 기업 분석에 필수적인 다양한 데이터를 제공합니다.</li>
              <li>서비스 이용을 위해 최초 1회 이용약관 동의가 필요합니다.</li>
              <li>크레디뷰 통합 회원이라면 추가 로그인없이 이용동의 후 서비스를 이용할 수 있습니다.</li>
            </ul>
          </div>

          <h3 class="font-h4 mt10">이용약관 동의</h3>

          <div class="box-panel spc-box">
            <div class="radiochk-root t--round">
              <label class="radiochk-label">
                <input type="checkbox" name="" />
                <span>
                  <span class="c--active">필수</span>
                  기업DB조회 서비스 이용약관
                </span>
              </label>
            </div>
            <button type="button" class="btn-icon">
              <i class="icon-comm i--next"></i>
              <span class="blind">전문보기</span>
            </button>
          </div>
        </div>
        <!-- //modal-contents -->

        <div class="modal-action">
          <div class="modal-action-btns">
            <button type="button" class="btn-contained" disabled>
              <span>동의하기</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- //modal-root -->
  </body>
</html>
